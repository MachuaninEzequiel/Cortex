# Cortex Damage Control Rules
# Reglas de seguridad para prevenir operaciones destructivas en Cortex

# ─── Comandos bash peligrosos ─────────────────────────────────────────────────
bashToolPatterns:
  # CRÍTICOS — Bloqueo total
  - pattern: "rm\\s+-rf?\\s+(vault|.cortex|.memory|.pi)"
    reason: "Eliminación de vault o memoria de Cortex — operación irreversible"
    block: true

  - pattern: "rm\\s+-rf?\\s+/"
    reason: "rm -rf en raíz del sistema"
    block: true

  - pattern: "DROP\\s+(TABLE|DATABASE|COLLECTION)"
    reason: "Operación destructiva de base de datos"
    block: true

  - pattern: "git\\s+push\\s+.*--force(?!-with-lease)"
    reason: "git push --force puede destruir historia del repositorio"
    block: true

  - pattern: "eval\\s*\\(|exec\\s*\\("
    reason: "eval/exec en código Python está prohibido en Cortex"
    block: true

  # ADVERTENCIA — Pedir confirmación
  - pattern: "git\\s+reset\\s+--hard"
    reason: "git reset --hard descarta cambios no commiteados"
    ask: true

  - pattern: "chromadb.*delete_collection"
    reason: "Eliminación de colección ChromaDB — pérdida de memoria episódica"
    ask: true

  - pattern: "cortex\\s+forget\\s+--all"
    reason: "Elimina TODAS las memorias episódicas"
    ask: true

  - pattern: "pip\\s+uninstall\\s+cortex"
    reason: "Desinstalar el paquete principal de Cortex"
    ask: true

  - pattern: "truncate\\s+--size\\s+0"
    reason: "Truncar archivos a tamaño 0"
    ask: true

  - pattern: "os\\.system\\s*\\("
    reason: "os.system() está prohibido — usar subprocess.run() en su lugar"
    ask: true

# ─── Rutas de acceso cero (ni leer ni escribir) ───────────────────────────────
zeroAccessPaths:
  - "**/.env"
  - "**/.env.*"
  - "~/.ssh/**"
  - "**/*.pem"
  - "**/*.key"
  - "**/id_rsa*"
  - "**/id_ed25519*"
  - "**/.netrc"

# ─── Rutas de solo lectura (no modificar) ─────────────────────────────────────
readOnlyPaths:
  - ".git/**"
  - "package-lock.json"
  - "bun.lock"
  - "/etc/**"
  - "/usr/local/lib/**"

# ─── Rutas protegidas (no eliminar, solo modificar) ───────────────────────────
noDeletePaths:
  - "vault/**"
  - ".cortex/specs/**"
  - "CHANGELOG.md"
  - "README.md"
  - "pyproject.toml"
  - "config.yaml"
  - ".cortex/skills/**"
  - ".pi/agents/**"
  - "AGENTS.md"

# ─── Tripartita Refinada — Handoff governance (0.5.0) ─────────────────────────
# Reglas que aplica el orquestador (cortex-SDDwork) o el runtime de Pi
# cuando se introducen handoffs estructurados entre subagents. La extensión
# Pi puede ignorar campos que no conozca; sirven como contrato declarativo
# para el orquestador y los runtimes futuros.
handoffRules:
  - id: handoff-malformed
    severity: block
    description: |
      Si el handoff YAML emitido por un subagent falla la validación contra
      cortex_validate_handoff (schema AgentHandoff), el chain DEBE detenerse.
      No pasar handoffs corruptos al siguiente agent — la información
      malformada se propaga silenciosamente y degrada todas las memorias
      derivadas.
    action:
      - "Stop the agent-chain immediately"
      - "Report the validation error to the user verbatim"
      - "Do NOT attempt to repair the YAML automatically"

  - id: handoff-status-mismatch
    severity: warn
    description: |
      Si un subagent declara status: complete pero su verified_claims está
      vacío o todos sus artifacts_produced son `unchanged`, el documenter
      debe marcar la memoria con confidence: asserted (no verified) y
      reportarlo en next_steps.
    action:
      - "Tag the produced session memory with confidence: asserted"
      - "Add an entry to next_steps describing the mismatch"

  - id: handoff-context-overflow
    severity: warn
    description: |
      Si context_for_next del handoff supera ~2000 caracteres, el siguiente
      agent puede confundir señales. Truncar o sintetizar antes de pasar.
    action:
      - "Truncate context_for_next to the most actionable items"
      - "Move the rest into a session note"
