name: CI - Pull Requests (Observability)

on:
  pull_request:
    branches: [main, master]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: write

jobs:
  hardening-gate:
    name: PR Observability
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency Audit (Safety)
        run: |
          pip install safety
          safety check
        continue-on-error: true

      - name: Lint Check (Ruff)
        id: lint
        run: ruff check cortex/
        continue-on-error: true

      - name: Type Check (Mypy)
        id: mypy
        run: mypy cortex/
        continue-on-error: true

      - name: Run Tests with Coverage
        id: tests
        run: |
          pytest --cov=cortex --cov-report=xml
        continue-on-error: true

      - name: Restore Cortex Memory Cache
        if: always()
        uses: actions/cache/restore@v4
        with:
          path: .memory/chroma
          key: cortex-memory-${{ github.run_id }}
          restore-keys: |
            cortex-memory-

      - name: Cortex — Capture & Search
        if: always()
        run: |
          cortex pr-context capture \
            --title "${{ github.event.pull_request.title }}" \
            --body "${{ github.event.pull_request.body || '' }}" \
            --author "${{ github.event.pull_request.user.login }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --target-branch "${{ github.event.pull_request.base.ref }}" \
            --output .pr-context.json
          cortex pr-context search --context-file .pr-context.json --output .past-context.json
        continue-on-error: true

      - name: Cortex — Store PR Context
        if: always()
        run: |
          cortex pr-context store \
            --context-file .pr-context.json \
            --lint-result "${{ steps.lint.outcome }}" \
            --audit-result "gitleaks=success,safety=warning" \
            --test-result "mypy=${{ steps.mypy.outcome }}, tests=${{ steps.tests.outcome }}"
        continue-on-error: true

      - name: Cortex — Generate Documentation
        if: always()
        run: |
          cortex pr-context generate \
            --context-file .pr-context.json \
            --vault vault
        continue-on-error: true

      - name: Cortex — Sync Vault
        if: always()
        run: cortex sync-vault
        continue-on-error: true

      - name: Save Cortex Memory Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .memory/chroma
          key: cortex-memory-${{ github.run_id }}

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Observability Summary
        if: always()
        run: |
          echo "Ruff: ${{ steps.lint.outcome }}"
          echo "Mypy: ${{ steps.mypy.outcome }}"
          echo "Tests: ${{ steps.tests.outcome }}"
          echo "PR workflow runs in observability mode and does not block merges on these checks."
