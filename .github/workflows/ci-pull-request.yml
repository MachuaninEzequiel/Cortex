name: CI - Pull Requests (DevSecDocOps)

on:
  pull_request:
    branches: [master]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quality-and-security-gate:
    name: Quality Gate + Cortex Memory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Project & Cortex
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── CORTEX: Restore Episodic Memory (ChromaDB) ──────────────
      # Key strategy: use a FIXED key "cortex-memory-main" so ALL
      # PR branches share the same ChromaDB snapshot.
      # The save step overwrites this key after every run,
      # so each PR adds its memories for the next one to find.
      - name: Restore Cortex Memory Cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .memory/chroma
          key: cortex-memory-main
          restore-keys: |
            cortex-memory-

      - name: Memory Cache Status
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Memory restored from cache (hit: true)"
            ls -la .memory/chroma/ || true
          else
            echo "🆕 Cold start — no previous memory found"
          fi

      # ── CORTEX: Capture PR Context ──────────────────────────────
      - name: Cortex — Capture PR Context
        run: |
          cortex pr-context capture \
            --title "${{ github.event.pull_request.title }}" \
            --body "${{ github.event.pull_request.body || '' }}" \
            --author "${{ github.event.pull_request.user.login }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --commit "${{ github.event.pull_request.head.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --target-branch "${{ github.event.pull_request.base.ref }}" \
            --output .pr-context.json

      # ── CALIDAD: Tests ─────────────────────────────────────────
      - name: Run Tests
        id: tests
        run: pytest tests/
        continue-on-error: true

      - name: Cortex — Store Test Result
        if: always()
        run: |
          TEST_STATUS="${{ steps.tests.outcome }}"
          cortex pr-context store \
            --context-file .pr-context.json \
            --test-result "$TEST_STATUS"

      # ── CORTEX: Search Past Context ────────────────────────────
      # With memory restored, Cortex will now FIND related past PRs.
      - name: Cortex — Search Past Context
        if: always()
        run: |
          cortex pr-context search \
            --context-file .pr-context.json \
            --output .past-context.json
        continue-on-error: true

      # ── CORTEX: Post Context to PR Comment ─────────────────────
      - name: Post Context to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .past-context.json ]; then
            HITS=$(python3 -c "
          import json
          data = json.load(open('.past-context.json'))
          hits = data.get('unified_hits', []) or data.get('episodic_hits', [])
          print(len(hits))
          " 2>/dev/null || echo "0")

            echo "## 🧠 Cortex Memory — Context Enricher" > context-comment.md
            echo "" >> context-comment.md

            if [ "$HITS" -gt "0" ]; then
              echo "Found **$HITS** related memories from past PRs:" >> context-comment.md
              echo "" >> context-comment.md
              python3 -c "
          import json
          data = json.load(open('.past-context.json'))
          hits = data.get('unified_hits', []) or data.get('episodic_hits', [])
          for h in hits[:3]:
              src = h.get('source', '?').upper()
              title = (h.get('display_title') or '')[:100]
              score = h.get('score', 0)
              print(f'- [{src}] **{title}** — score: {score:.3f}')
          " >> context-comment.md 2>/dev/null || echo "- (could not parse hits)" >> context-comment.md
            else
              echo "🆕 No related memories found yet — this is a cold start or first PR in this domain." >> context-comment.md
            fi

            gh pr comment ${{ github.event.pull_request.number }} -F context-comment.md || true
          fi

      # ── CORTEX: Generate Documentation ─────────────────────────
      - name: Cortex — Generate Documentation
        if: always()
        run: |
          cortex pr-context generate \
            --context-file .pr-context.json \
            --vault vault

      # ── CORTEX: Sync Vault ─────────────────────────────────────
      - name: Cortex — Sync Vault
        if: always()
        run: cortex sync-vault

      # ── CORTEX: Save Memory Cache ──────────────────────────────
      # Overwrites cortex-memory-main so the NEXT run picks it up.
      - name: Save Cortex Memory Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .memory/chroma
          key: cortex-memory-main

      # ── Auto Commit Generated Docs ─────────────────────────────
      - name: Auto-commit documentation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(cortex): auto-generate DevSecDocOps context and sync vault"
          file_pattern: "vault/**"

      # ── Upload Context Artifact ────────────────────────────────
      - name: Upload Cortex Context Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-pr-context-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: |
            .pr-context.json
            .past-context.json
          if-no-files-found: warn
          retention-days: 14

      - name: Check Test Gate
        if: steps.tests.outcome != 'success'
        run: |
          echo "❌ Tests failed. Fix before merging."
          exit 1
