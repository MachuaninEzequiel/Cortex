name: CI - Security Deep Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Static Analysis (Bandit)
        run: bandit -r cortex/ -ll -v

      - name: Dependency Scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit
